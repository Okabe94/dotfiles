# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Floating windows
windowrule = float true, size 800 130, center true, match:initial_class (Power)
windowrule = float true, size 800 600, center true, match:initial_class (Wiremix)

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class (.*)

# Fix some dragging issues with XWayland
windowrule = no_focus true, match:class (^$), match:title (^$), match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Add transparency
# windowrule = opacity 0.95 override 0.95, class:.*
windowrule = opacity 0.95 override 0.95, match:class ^(jetbrains-studio)$
windowrule = opacity 0.95 override 0.95, match:class ^(vesktop)$
